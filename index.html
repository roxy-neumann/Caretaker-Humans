<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Last Caretaker - Humans</title>
    <link rel="icon" type="image/png" href="img/icon.png" />
    <link rel="stylesheet" href="styles.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9806666918883207" crossorigin="anonymous"></script>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <img class="title-logo" src="img/logo.webp" alt="The Last Caretaker logo" />
                <h1 class="title">Humans Helper</h1>
            </div>
            <div class="header-ad-container">
                <!-- header-ad -->
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9806666918883207" data-ad-slot="5587180852" data-full-width-responsive="true"></ins>
                <script> (adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </div>

        <section class="data-section">
            <div class="panel controls">
                <div class="controls-grid">
                    <div class="controls-left">
                        <h2 class="section-title">Food</h2>
                        <div class="search-block">
                            <input id="foodSearchInput" class="search-input" type="text" placeholder="Type part of a food name..." />
                        </div>

                        <button id="foodClearFiltersBtn" class="clear-btn" type="button">Clear Filters</button>

                        <div id="foodResultsInfo" class="results-info">0 items</div>
                    </div>
                </div>
            </div>

            <div class="panel table-panel">
                <div class="table-wrap">
                    <table class="food-table">
                        <thead>
                            <tr id="foodTableHeadRow"></tr>
                        </thead>
                        <tbody id="foodTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="data-section">
            <div class="panel controls">
                <div class="controls-grid">
                    <div class="controls-left">
                        <h2 class="section-title">Memories</h2>
                        <div class="search-block">
                            <input id="memorySearchInput" class="search-input" type="text" placeholder="Type part of a memory name..." />
                        </div>

                        <button id="memoryClearFiltersBtn" class="clear-btn" type="button">Clear Filters</button>

                        <div id="memoryResultsInfo" class="results-info">0 items</div>
                    </div>
                </div>
            </div>

            <div class="panel table-panel">
                <div class="table-wrap">
                    <table class="memory-table">
                        <thead>
                            <tr id="memoryTableHeadRow"></tr>
                        </thead>
                        <tbody id="memoryTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="imageModal" class="image-modal" aria-hidden="true">
        <div class="image-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
            <button id="imageModalClose" class="image-modal-close" type="button" aria-label="Close image preview">x</button>
            <img id="imageModalImg" class="image-modal-img" src="" alt="" />
            <div id="imageModalTitle" class="image-modal-title"></div>
        </div>
    </div>

    <div id="recipeModal" class="recipe-modal" aria-hidden="true">
        <div class="recipe-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="recipeModalTitle">
            <button id="recipeModalClose" class="modal-close" type="button" aria-label="Close recipe">x</button>
            <h2 id="recipeModalTitle" class="recipe-modal-title"></h2>
            <ul id="recipeModalList" class="recipe-modal-list"></ul>
        </div>
    </div>

    <div id="materialsModal" class="recipe-modal" aria-hidden="true">
        <div class="recipe-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="materialsModalTitle">
            <button id="materialsModalClose" class="modal-close" type="button" aria-label="Close food materials info">x</button>
            <h2 id="materialsModalTitle" class="recipe-modal-title">Food Materials Info</h2>
            <p class="modal-description">Total materials needed to craft one of every food type.</p>
            <div class="materials-view-switch" role="group" aria-label="Food materials presentation">
                <button id="materialsByMaterialBtn" class="recipe-btn materials-view-btn is-active" type="button">By Material</button>
                <button id="materialsByOrganicBtn" class="recipe-btn materials-view-btn" type="button">By Organic</button>
            </div>
            <ul id="materialsModalList" class="recipe-modal-list"></ul>
        </div>
    </div>

    <script src="data-food.js"></script>
    <script src="data-memory.js"></script>
    <script src="data-organic.js"></script>
    <script src="app.js"></script>
</body>

</html>
